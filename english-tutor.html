<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Tutor AI - Voice Chat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #e0e0e0;
}
.container {
  width: 100%; max-width: 800px; height: 100vh; max-height: 900px;
  display: flex; flex-direction: column;
  background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
  border-radius: 24px; overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5); margin: 20px;
}
header { text-align: center; padding: 24px 20px 16px; background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.08); }
header h1 { font-size: 28px; font-weight: 700; background: linear-gradient(135deg,#667eea,#764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.subtitle { font-size: 14px; color: rgba(255,255,255,0.5); margin-top: 4px; }
.level-selector { padding: 16px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.08); }
.level-selector label { display: block; font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
.level-buttons { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.level-btn {
  padding: 8px 16px; border: 2px solid rgba(255,255,255,0.15); border-radius: 20px;
  background: transparent; color: rgba(255,255,255,0.7); font-size: 13px;
  cursor: pointer; transition: all 0.3s ease; font-weight: 500;
}
.level-btn:hover { border-color: #667eea; color: #fff; background: rgba(102,126,234,0.1); }
.level-btn.active { border-color: #667eea; background: linear-gradient(135deg,#667eea,#764ba2); color: #fff; }
.chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.chat-messages::-webkit-scrollbar { width: 6px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
.message { display: flex; gap: 12px; align-items: flex-start; max-width: 85%; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.message.user { align-self: flex-end; flex-direction: row-reverse; }
.avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.message.tutor .avatar { background: linear-gradient(135deg,#667eea,#764ba2); color: #fff; }
.message.user .avatar { background: linear-gradient(135deg,#f093fb,#f5576c); color: #fff; }
.bubble { padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; word-wrap: break-word; }
.message.tutor .bubble { background: rgba(255,255,255,0.08); border-bottom-left-radius: 4px; }
.message.user .bubble { background: linear-gradient(135deg,#667eea,#764ba2); border-bottom-right-radius: 4px; color: #fff; }
.chat-input-area { display: flex; gap: 10px; padding: 16px 20px; background: rgba(255,255,255,0.03); border-top: 1px solid rgba(255,255,255,0.08); align-items: center; }
.mic-btn, .send-btn { width: 44px; height: 44px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; flex-shrink: 0; }
.mic-btn { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
.mic-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
.mic-btn.listening { background: #f5576c; color: #fff; animation: pulse 1.5s infinite; }
@keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(245,87,108,0.6); } 50% { box-shadow: 0 0 0 12px rgba(245,87,108,0); } 100% { box-shadow: 0 0 0 0 rgba(245,87,108,0); } }
.send-btn { background: linear-gradient(135deg,#667eea,#764ba2); color: #fff; }
.send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(102,126,234,0.4); }
#textInput { flex: 1; padding: 12px 16px; border: 2px solid rgba(255,255,255,0.1); border-radius: 22px; background: rgba(255,255,255,0.05); color: #fff; font-size: 15px; outline: none; transition: border-color 0.3s ease; }
#textInput:focus { border-color: #667eea; }
#textInput::placeholder { color: rgba(255,255,255,0.3); }
.typing-indicator { display: flex; gap: 4px; padding: 4px 0; }
.typing-indicator span { width: 8px; height: 8px; background: rgba(255,255,255,0.4); border-radius: 50%; animation: typingBounce 1.4s infinite; }
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce { 0%,80%,100% { transform: scale(0.6); } 50% { transform: scale(1); } }
.server-status { position: absolute; top: 12px; right: 20px; font-size: 11px; display: flex; align-items: center; gap: 6px; }
.server-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.server-dot.online { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
.server-dot.offline { background: #f44336; }
</style>
</head>
<body>
<div class="container" style="position:relative">
  <div class="server-status">
    <span class="server-dot" id="serverDot"></span>
    <span id="serverLabel">checking...</span>
  </div>
  <header>
    <h1>English Tutor AI</h1>
    <p class="subtitle">Learn English with voice chat</p>
  </header>
  <div class="level-selector">
    <label>Choose your level:</label>
    <div class="level-buttons">
      <button class="level-btn" data-level="A1">A1 - Beginner</button>
      <button class="level-btn" data-level="A2">A2 - Elementary</button>
      <button class="level-btn active" data-level="B1">B1 - Intermediate</button>
      <button class="level-btn" data-level="B2">B2 - Upper Intermediate</button>
      <button class="level-btn" data-level="C1">C1 - Advanced</button>
    </div>
  </div>
  <div class="chat-container">
    <div class="chat-messages" id="chatMessages">
      <div class="message tutor">
        <div class="avatar">AI</div>
        <div class="bubble">Hello! I'm your English tutor. Select your level above and let's start practicing! Click the microphone to speak or type a message.</div>
      </div>
    </div>
    <div class="chat-input-area">
      <button class="mic-btn" id="micBtn" title="Click to speak">
        <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 14a3 3 0 003-3V5a3 3 0 00-6 0v6a3 3 0 003 3zm5-3a5 5 0 01-10 0H5a7 7 0 0014 0h-2z"/><path fill="currentColor" d="M11 19.93V22h2v-2.07A7.01 7.01 0 0019 13h-2a5 5 0 01-10 0H5a7.01 7.01 0 006 6.93z"/></svg>
      </button>
      <input type="text" id="textInput" placeholder="Type a message..." />
      <button class="send-btn" id="sendBtn">
        <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const API_URL = '';

const SYSTEM_PROMPTS = {
  A1: `You are a patient English teacher for A1 (Beginner) level students.
Rules:
- Use ONLY the 500 most common English words
- Speak in simple present tense
- Use very short sentences (3-5 words)
- Repeat key vocabulary often
- Speak slowly and clearly
- One topic per message
- Always include a simple question
- Correct mistakes gently
- Example: "I am a teacher. You are a student. I like apples. Do you like apples?"`,

  A2: `You are an English teacher for A2 (Elementary) level students.
Rules:
- Use common everyday vocabulary
- Use simple present and simple past tense
- Short to medium sentences (5-8 words)
- Introduce new words with explanations
- Ask simple questions
- Talk about daily life, family, hobbies
- Example: "Yesterday I went to the park. I played football. Did you play yesterday?"`,

  B1: `You are an English teacher for B1 (Intermediate) level students.
Rules:
- Use moderate vocabulary with some idioms
- Use various tenses (present, past, future, present perfect)
- Medium length sentences
- Discuss opinions, plans, experiences
- Encourage detailed responses
- Ask "why" and "how" questions
- Example: "I think traveling is a great way to learn. Have you ever traveled to another country? What did you learn?"`,

  B2: `You are an English teacher for B2 (Upper Intermediate) level students.
Rules:
- Use rich vocabulary and common idioms
- Use all tenses naturally
- Complex sentences with connectors
- Discuss abstract topics, news, culture
- Use persuasive and descriptive language
- Ask for opinions and arguments
- Example: "While technology has brought us closer together, some argue it creates new forms of isolation. What's your perspective on this?"`,

  C1: `You are an English teacher for C1 (Advanced) level students.
Rules:
- Use sophisticated vocabulary and complex idioms
- Use all grammatical structures fluently
- Use nuanced expressions and subtext
- Discuss complex topics: philosophy, science, society
- Use rhetorical questions
- Challenge the student's thinking
- Near-native conversational style
- Example: "One might argue that the very nature of consciousness eludes empirical scrutiny. To what extent do you believe subjective experience can be quantified?"`,
};

let currentLevel = 'B1';
let recognition = null;
let isListening = false;

const chatMessages = document.getElementById('chatMessages');
const textInput = document.getElementById('textInput');
const sendBtn = document.getElementById('sendBtn');
const micBtn = document.getElementById('micBtn');
const serverDot = document.getElementById('serverDot');
const serverLabel = document.getElementById('serverLabel');

async function checkServer() {
  try {
    const res = await fetch(`${API_URL}/api/health`);
    const data = await res.json();
    if (data.healthy) {
      serverDot.className = 'server-dot online';
      serverLabel.textContent = 'AI ready';
      return true;
    }
  } catch (e) {}
  serverDot.className = 'server-dot offline';
  serverLabel.textContent = 'AI offline';
  return false;
}

document.querySelectorAll('.level-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLevel = btn.dataset.level;
    chatMessages.innerHTML = '';
    addMessage('tutor', `Switched to ${currentLevel}. Let's practice ${currentLevel} English!`);
  });
});

sendBtn.addEventListener('click', sendMessage);
textInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });
micBtn.addEventListener('click', toggleListening);

async function sendMessage() {
  const text = textInput.value.trim();
  if (!text) return;
  textInput.value = '';
  addMessage('user', text);
  await getAIResponse(text);
}

function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `<div class="avatar">${role === 'user' ? 'You' : 'AI'}</div><div class="bubble">${content}</div>`;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function addTypingIndicator() {
  const div = document.createElement('div');
  div.className = 'message tutor';
  div.id = 'typingIndicator';
  div.innerHTML = `<div class="avatar">AI</div><div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function removeTypingIndicator() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

async function getAIResponse(userMessage) {
  const online = await checkServer();
  if (!online) {
    addMessage('tutor', 'AI service is not available. Check that the server is running and API key is set.');
    return;
  }

  addTypingIndicator();
  try {
    const res = await fetch(`${API_URL}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [{ role: 'user', content: userMessage }],
        level: currentLevel,
      }),
    });

    const data = await res.json();
    removeTypingIndicator();

    if (data.error) throw new Error(data.error);
    addMessage('tutor', data.reply);
    speakText(data.reply);
  } catch (err) {
    removeTypingIndicator();
    addMessage('tutor', 'Error: ' + err.message);
  }
}

function toggleListening() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Speech recognition not supported. Use Chrome or Edge.');
    return;
  }
  isListening ? stopListening() : startListening();
}

function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onstart = () => { isListening = true; micBtn.classList.add('listening'); };
  recognition.onresult = (event) => {
    textInput.value = event.results[0][0].transcript;
    stopListening();
    sendMessage();
  };
  recognition.onerror = (event) => {
    stopListening();
    if (event.error === 'not-allowed') alert('Microphone access denied. Allow microphone permissions.');
  };
  recognition.onend = () => stopListening();
  try { recognition.start(); } catch (e) { console.error(e); }
}

function stopListening() {
  isListening = false;
  micBtn.classList.remove('listening');
  if (recognition) { try { recognition.stop(); } catch (e) {} recognition = null; }
}

function speakText(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'en-US';
  utterance.rate = currentLevel === 'A1' ? 0.6 : currentLevel === 'A2' ? 0.7 : currentLevel === 'B1' ? 0.85 : currentLevel === 'B2' ? 0.95 : 1.0;
  const voices = window.speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang.startsWith('en') && v.name.includes('Google')) || voices.find(v => v.lang.startsWith('en'));
  if (enVoice) utterance.voice = enVoice;
  window.speechSynthesis.speak(utterance);
}

setInterval(checkServer, 10000);
checkServer();
</script>
</body>
</html>
